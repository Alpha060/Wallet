<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - Manual Wallet Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>API Connection Test</h1>
    
    <div class="test-section">
        <h2>1. Backend Connection Test</h2>
        <button onclick="testBackendConnection()">Test Backend</button>
        <div id="backendResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. Check Current User</h2>
        <button onclick="checkCurrentUser()">Check User</button>
        <div id="userResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. Test Balance API</h2>
        <button onclick="testBalance()">Get Balance</button>
        <div id="balanceResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. Test Transactions API</h2>
        <button onclick="testTransactions()">Get Transactions</button>
        <div id="transactionsResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>5. Go to Main App</h2>
        <button onclick="window.location.href='/index.html'">Open Main App</button>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        function showResult(elementId, message, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'result ' + (isError ? 'error' : 'success');
        }

        async function testBackendConnection() {
            try {
                showResult('backendResult', 'Testing connection...');
                const response = await fetch('http://localhost:3000/api/health');
                
                if (response.ok) {
                    const data = await response.json();
                    showResult('backendResult', `✅ Backend is running!\n${JSON.stringify(data, null, 2)}`);
                } else {
                    showResult('backendResult', `❌ Backend responded with status: ${response.status}`, true);
                }
            } catch (error) {
                showResult('backendResult', `❌ Cannot connect to backend:\n${error.message}\n\nMake sure backend is running on port 3000`, true);
            }
        }

        function checkCurrentUser() {
            const token = localStorage.getItem('wallet_auth_token');
            const user = localStorage.getItem('wallet_user_data');
            
            if (!token) {
                showResult('userResult', '❌ No user logged in\n\nPlease login first at /pages/login.html', true);
                return;
            }

            try {
                const userData = JSON.parse(user);
                showResult('userResult', `✅ User logged in:\n${JSON.stringify(userData, null, 2)}\n\nToken: ${token.substring(0, 20)}...`);
            } catch (error) {
                showResult('userResult', `❌ Invalid user data in localStorage\n\nRaw user data: ${user}\n\nError: ${error.message}\n\nFix: Click button below to clear and re-login`, true);
                
                // Add clear button
                const clearBtn = document.createElement('button');
                clearBtn.textContent = 'Clear Storage & Go to Login';
                clearBtn.style.marginTop = '10px';
                clearBtn.onclick = () => {
                    localStorage.clear();
                    window.location.href = '/pages/login.html';
                };
                document.getElementById('userResult').appendChild(clearBtn);
            }
        }

        async function testBalance() {
            const token = localStorage.getItem('wallet_auth_token');
            
            if (!token) {
                showResult('balanceResult', '❌ Not logged in. Please login first.', true);
                return;
            }

            try {
                showResult('balanceResult', 'Fetching balance...');
                const response = await fetch(`${API_BASE_URL}/wallet/balance`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('balanceResult', `✅ Balance fetched successfully:\n${JSON.stringify(data, null, 2)}`);
                } else {
                    showResult('balanceResult', `❌ Failed to fetch balance:\n${JSON.stringify(data, null, 2)}`, true);
                }
            } catch (error) {
                showResult('balanceResult', `❌ Error:\n${error.message}`, true);
            }
        }

        async function testTransactions() {
            const token = localStorage.getItem('wallet_auth_token');
            
            if (!token) {
                showResult('transactionsResult', '❌ Not logged in. Please login first.', true);
                return;
            }

            try {
                showResult('transactionsResult', 'Fetching transactions...');
                const response = await fetch(`${API_BASE_URL}/wallet/transactions?page=1&limit=5`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('transactionsResult', `✅ Transactions fetched successfully:\n${JSON.stringify(data, null, 2)}`);
                } else {
                    showResult('transactionsResult', `❌ Failed to fetch transactions:\n${JSON.stringify(data, null, 2)}`, true);
                }
            } catch (error) {
                showResult('transactionsResult', `❌ Error:\n${error.message}`, true);
            }
        }

        // Auto-run backend test on load
        window.addEventListener('load', () => {
            testBackendConnection();
            checkCurrentUser();
        });
    </script>
</body>
</html>
