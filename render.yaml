services:
  # PostgreSQL Database
  - type: pserv
    name: wallet-db
    env: docker
    plan: free
    region: singapore
    ipAllowList: []
    databases:
      - name: wallet_db
        user: wallet_user

  # Web Service
  - type: web
    name: kyc-wallet-app
    env: node
    region: singapore
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: wallet-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: wallet-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: wallet-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: wallet-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: wallet-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: wallet-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: Admin@123456
